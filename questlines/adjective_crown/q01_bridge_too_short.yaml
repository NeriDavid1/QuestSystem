quest:
  id: q01_bridge_too_short
  name: "The Bridge Is Too Short"
  level_required: 1
  giver_npc: adjective_knight
  prerequisite: null
  summary: "The player observes an existing short bridge and spells its opposite adjective, LONG, without changing the bridge."

rewards:
  xp: 50
  items:
    - id: length_crystal
      amount: 1

steps:
  - type: talk_to_npc
    npc_id: adjective_knight
    dialogue_id: adjective_knight_crown_intro

  - type: reach_location
    location_id: adjective_short_bridge

  - type: play_minigame
    minigame_id: letter_ordering
    difficulty: 1
    success_required: true

  - type: return_to_npc
    npc_id: adjective_knight
    dialogue_id: adjective_knight_length_restored
