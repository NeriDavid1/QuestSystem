quest:
  id: q04_big_and_small_animals
  name: "Big and Small Animals"
  level_required: 5
  giver_npc: adjective_grandmother
  prerequisite: q03_whispering_stone
  summary: "The player compares the existing sheep and cows and identifies which animals are BIG and which are SMALL."

rewards:
  xp: 150
  items:
    - id: size_crystal
      amount: 1

steps:
  - type: talk_to_npc
    npc_id: adjective_grandmother
    dialogue_id: adjective_grandmother_big_and_small_animals

  - type: reach_location
    location_id: adjective_animal_field

  - type: play_minigame
    minigame_id: word_matching
    difficulty: 2
    success_required: true

  - type: return_to_npc
    npc_id: adjective_grandmother
    dialogue_id: adjective_grandmother_size_complete
