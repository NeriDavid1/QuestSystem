quest:
  id: q02_five_small_sheep
  name: "Five Small Sheep"
  level_required: 3
  giver_npc: adjective_grandmother
  prerequisite: q01_bridge_too_short
  summary: "The player identifies five small sheep among the existing animals and returns to the Grandmother."

rewards:
  xp: 100
  items:
    - id: description_crystal
      amount: 1

steps:
  - type: talk_to_npc
    npc_id: adjective_grandmother
    dialogue_id: adjective_grandmother_five_small_sheep

  - type: reach_location
    location_id: adjective_mixed_meadow

  - type: collect_item
    item_id: small_sheep
    amount: 5

  - type: deliver_item
    npc_id: adjective_grandmother
    item_id: small_sheep
    amount: 5
    dialogue_id: adjective_grandmother_flock_complete

  - type: return_to_npc
    npc_id: adjective_grandmother
    dialogue_id: adjective_grandmother_description_restored
