quest:
  id: q04_not_so_big_zombie
  name: "The Not-So-Big Zombie"
  level_required: 5
  giver_npc: adjective_village_chief
  prerequisite: q03_matter_of_weight
  summary: "The player changes a big invulnerable zombie into a small zombie, then defeats it to reopen the village."

rewards:
  xp: 125
  items:
    - id: size_crystal
      amount: 1

steps:
  - type: talk_to_npc
    npc_id: adjective_village_chief
    dialogue_id: adjective_village_chief_big_zombie

  - type: reach_location
    location_id: adjective_village_gate

  - type: play_minigame
    minigame_id: letter_ordering
    difficulty: 2
    success_required: true

  - type: defeat_enemy
    enemy_id: adjective_small_zombie
    amount: 1

  - type: collect_item
    item_id: size_crystal
    amount: 1

  - type: return_to_npc
    npc_id: adjective_village_chief
    dialogue_id: adjective_village_chief_size_restored
