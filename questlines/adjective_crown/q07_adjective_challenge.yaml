quest:
  id: q07_adjective_challenge
  name: "The Adjective Challenge"
  level_required: 10
  giver_npc: adjective_knight
  prerequisite: q06_from_low_to_high
  summary: "Beside the Adjective Knight, the player completes one final matching challenge using every opposite adjective pair learned."

rewards:
  xp: 350
  items:
    - id: coin
      amount: 10

steps:
  - type: talk_to_npc
    npc_id: adjective_knight
    dialogue_id: adjective_knight_final_challenge

  - type: play_minigame
    minigame_id: word_matching
    difficulty: 4
    success_required: true
  - type: return_to_npc
    npc_id: adjective_knight
    dialogue_id: adjective_knight_challenge_complete
