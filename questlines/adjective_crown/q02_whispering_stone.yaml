quest:
  id: q02_whispering_stone
  name: "The Whispering Stone"
  level_required: 3
  giver_npc: adjective_water_man
  prerequisite: q01_bridge_too_short
  summary: "Say HOT in the forest, receive one Herbs item, and deliver it to the Water Man."

rewards: { xp: 100, items: [] }

steps:
  - type: talk_to_npc
    npc_id: adjective_water_man
    dialogue_id: adjective_water_man_herbs_request
  - type: reach_location
    location_id: adjective_forest_clearing
  - type: play_minigame
    minigame_id: speak_aloud
    difficulty: 2
    success_required: true
    reward_item_id: herbs
    reward_amount: 1
  - type: deliver_item
    npc_id: adjective_water_man
    item_id: herbs
    amount: 1
    dialogue_id: adjective_water_man_herbs_delivered
