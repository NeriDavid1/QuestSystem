quest:
  id: q02_whispering_stone
  name: "The Whispering Stone"
  level_required: 2
  giver_npc: adjective_water_man
  prerequisite: q01_bridge_too_short
  summary: "The player says HOT aloud to warm a cold magic stone and release the second crystal."

rewards:
  xp: 75
  items:
    - id: warmth_crystal
      amount: 1

steps:
  - type: talk_to_npc
    npc_id: adjective_water_man
    dialogue_id: adjective_water_man_cold_stone

  - type: reach_location
    location_id: adjective_frozen_spring

  - type: play_minigame
    minigame_id: speak_aloud
    difficulty: 4
    success_required: true

  - type: collect_item
    item_id: warmth_crystal
    amount: 1

  - type: return_to_npc
    npc_id: adjective_water_man
    dialogue_id: adjective_water_man_warmth_restored
