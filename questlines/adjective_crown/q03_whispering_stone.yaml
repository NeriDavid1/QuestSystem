quest:
  id: q03_whispering_stone
  name: "The Whispering Stone"
  level_required: 4
  giver_npc: adjective_water_man
  prerequisite: q02_five_small_sheep
  summary: "In a forest clearing, the player says HOT aloud to melt the existing ice block and release its crystal."

rewards:
  xp: 125
  items:
    - id: warmth_crystal
      amount: 1

steps:
  - type: talk_to_npc
    npc_id: adjective_water_man
    dialogue_id: adjective_water_man_forest_ice

  - type: reach_location
    location_id: adjective_forest_clearing

  - type: play_minigame
    minigame_id: speak_aloud
    difficulty: 2
    success_required: true

  - type: collect_item
    item_id: warmth_crystal
    amount: 1

  - type: return_to_npc
    npc_id: adjective_water_man
    dialogue_id: adjective_water_man_warmth_restored
