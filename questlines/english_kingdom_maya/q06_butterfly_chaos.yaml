quest:
  id: q06_butterfly_chaos
  name: "Butterfly Letter Chaos"
  level_required: 6
  giver_npc: teacher_maya
  prerequisite: q05_mystery_egg
  summary: "פרפרים מעופפים עם אותיות F על הכנפיים מסביב לגן — כל פעם שהם נוחתים, הם משנים שלט ל-FLY או FRY (צ'יפס מעופף)!"

rewards:
  xp: 150
  items:
    - id: letter_f
      amount: 1

steps:
  - type: talk_to_npc
    npc_id: teacher_maya
    dialogue_id: maya_butterfly_f_chaos

  - type: reach_location
    location_id: KingdomGate

  - type: defeat_enemy
    enemy_id: letter_slime
    amount: 2

  - type: play_minigame
    minigame_id: letter_drawing
    world_object_id: Wooden_Cart1_Inside_Gate
    difficulty: 2
    success_required: true

  - type: collect_item
    item_id: letter_f
    amount: 1

  - type: return_to_npc
    npc_id: teacher_maya
    dialogue_id: maya_butterflies_calm
