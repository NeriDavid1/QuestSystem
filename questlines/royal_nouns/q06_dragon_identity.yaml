  - type: play_minigame
    minigame_id: word_matching
    world_object_id: Lost_Chest3_Forsaken_Cove
    difficulty: 5
    success_required: true

  - type: play_minigame
    minigame_id: letter_ordering
    world_object_id: Lost_Chest3_Forsaken_Cove
    difficulty: 5
    success_required: true

  - type: play_minigame
    minigame_id: speak_aloud
    world_object_id: Lost_Chest3_Forsaken_Cove
    difficulty: 5
    success_required: true

  - type: collect_item
    item_id: noun_creatures_page
    amount: 1

  - type: return_to_npc
    npc_id: offended_dragon
    dialogue_id: nouns_dragon_names_restored
