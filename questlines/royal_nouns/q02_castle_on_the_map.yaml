quest:
  id: q02_castle_on_the_map
  name: "The Castle That Became a Tower"
  level_required: 5
  giver_npc: royal_librarian
  prerequisite: q01_roles_without_names
  summary: "CASTLE, TOWER, and GATE swap places on the royal map and send everyone to the wrong destination."

rewards:
  xp: 125
  items:
    - id: noun_places_page
      amount: 1

steps:
  - type: talk_to_npc
    npc_id: royal_librarian
    dialogue_id: nouns_librarian_mixed_places

  - type: reach_location
    location_id: KingdomGate

  - type: play_minigame
    minigame_id: word_matching
    world_object_id: Exam_Table1_Outside_Gate
    difficulty: 3
    success_required: true

  - type: play_minigame
    minigame_id: letter_ordering
    world_object_id: Exam_Table1_Outside_Gate
    difficulty: 3
    success_required: true

  - type: play_minigame
    minigame_id: speak_aloud
    world_object_id: Exam_Table1_Outside_Gate
    difficulty: 4
    success_required: true

  - type: collect_item
    item_id: noun_places_page
    amount: 1

  - type: return_to_npc
    npc_id: royal_librarian
    dialogue_id: nouns_librarian_places_restored
