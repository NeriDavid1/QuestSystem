    tasks:
      - "התבוננו בגשר הקיים: הוא <strong>short</strong> — קצר"
      - "גררו את האותיות <strong>l, o, n, g</strong> אל ארבע המשבצות"
      - "קראו את המילה שיצרתם: <strong>long</strong> — ארוך"
