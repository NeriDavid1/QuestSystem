# Per-step minigame briefs — The Royal Book of Nouns.
# Keys use {quest_id}_s{zero-based step index}.

instances:
  q01_roles_without_names_s2:
    instruction: "התאימו את ה־nouns לדמויות הנכונות בחדר הכס"
    tasks:
      - "התאימו <strong>king</strong> לתמונת המלך"
      - "התאימו <strong>queen</strong> לתמונת המלכה"
      - "התאימו <strong>knight</strong> לתמונת האביר"
      - "בסיבוב השני התמונות מחליפות מקום — התאימו שוב בלי להסתמך על המיקום"
    target: "king, queen, knight"
    variant: "word_to_image"
    success: "שלוש הדמויות מקבלות בחזרה את השמות הנכונים"

  q01_roles_without_names_s3:
    instruction: "שחזרו את האות K בתחילת המילה KING"
    tasks:
      - "על דף הספר מופיעה המילה <strong>_ING</strong>"
      - "עקבו אחר הקו המנוקד וציירו <strong>K</strong> גדולה"
      - "קראו את המילה השלמה: <strong>KING</strong>"
    target: "K in KING"
    variant: "trace_guided"
    success: "המילה KING חוזרת לדף אנשי המלוכה"

  q01_roles_without_names_s4:
    instruction: "הקשיבו ואמרו את שמות אנשי המלוכה באנגלית"
    tasks:
      - "לחצו על Hear it והקשיבו ל־<strong>king</strong>, ואז אמרו king"
      - "הקשיבו ל־<strong>queen</strong>, ואז אמרו queen"
      - "הקשיבו ל־<strong>knight</strong>, ואז אמרו knight — האות K אינה נשמעת"
    target: "king, queen, knight"
    variant: "repeat_after_npc"
    success: "הספר מזהה את שלושת ה־nouns ומאיר"

  q02_castle_on_the_map_s2:
    instruction: "התאימו כל noun למקום הנכון במפת הממלכה"
    tasks:
      - "התאימו <strong>castle</strong> לתמונת הטירה השלמה"
      - "התאימו <strong>tower</strong> לתמונת המגדל הגבוה"
      - "התאימו <strong>gate</strong> לתמונת השער בכניסה לטירה"
      - "זכרו: tower יכולה להיות חלק מ־castle, ו־gate היא הכניסה"
    target: "castle, tower, gate"
    variant: "word_to_image"
    success: "המפה שולחת את תושבי הממלכה למקומות הנכונים"

  q02_castle_on_the_map_s3:
    instruction: "סדרו את האותיות כדי לשחזר את המילה CASTLE"
    tasks:
      - "גררו את האותיות <strong>c, a, s, t, l, e</strong> למשבצות"
      - "התעלמו מאותיות המסיחות"
      - "קראו את המילה השלמה: <strong>castle</strong>"
    target: "castle"
    variant: "word_spelling"
    success: "הכרטיס CASTLE חוזר למקום הנכון על המפה"

  q02_castle_on_the_map_s4:
    instruction: "הקשיבו ואמרו שלושה nouns של מקומות"
    tasks:
      - "הקשיבו ואמרו <strong>castle</strong>"
      - "הקשיבו ואמרו <strong>tower</strong>"
      - "הקשיבו ואמרו <strong>gate</strong>"
