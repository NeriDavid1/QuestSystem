    variant: "repeat_after_npc"
    success: "שלושת שמות המקומות נשמרים בדף המפה"

  q03_crown_soup_s2:
    instruction: "התאימו את שמות אוצרות הארמון לחפצים הנכונים"
    tasks:
      - "התאימו <strong>crown</strong> לכתר, לא לקערת המרק"
      - "התאימו <strong>throne</strong> לכיסא"
      - "התאימו <strong>treasure</strong> לאוצר שבכספת"
