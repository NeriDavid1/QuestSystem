# תרגום עברית לתוכן המשימות — ממוזג בהצגה ובבנייה

npcs:
  theron:
    name: "תרון"
    title: "נפח"
    location: "רובע הנפחים"
    description: "אומן נפח שלומד אתכם יצירה דרך עבודה מעשית."
  lina:
    name: "לינה"
    title: "סוחרת"
    location: "כיכר השוק"
    description: "סוחרת חדת עין שבוחנת אתכם בעסקאות ומשלוחים."
  marcus:
    name: "מרקוס"
    title: "קפטן המשמר"
    location: "מצודת העיר"
    description: "חייל ותיק שמטיל עליכם משימות סיור ולחימה."
  elara:
    name: "אלארה"
    title: "צמחית"
    location: "שולי יער הערפל"
    description: "מרפאה שולחת אתכם לאסוף צמחים נדירים."
  vex:
    name: "וקס"
    title: "הזר"
    location: "מיקום משתנה"
    description: "דמות מסתורית עם קשת עלילה ארוכה."
  teacher_maya:
    name: "מאיה"
    title: "מורת אנגלית"
    location: "ממלכת האנגלית — כיכר האלף-בית"
    description: "מורה עליזה שמלמדת אותיות ומילים בעזרת סיפורים מצחיקים."

  adjective_knight:
    name: "האביר"
    title: "שומר כתר התארים"
    location: "ממלכת התארים — מחנה הכתר"
    description: "אביר ללא שם שמבקש מגיבורים צעירים להשיב את גבישי כתר התארים."
  adjective_village_chief:
    name: "ראש הכפר"
    title: "ראש הכפר"
    location: "ממלכת התארים — שער הכפר"
    description: "מנהיג הכפר שזקוק לעזרה כדי להפוך את הכניסה לבטוחה שוב."
  adjective_water_man:
    name: "איש המים"
    title: "שומר המעיין"
    location: "ממלכת התארים — המעיין הקפוא"
    description: "האחראי על המעיינות ודרכי המים של הממלכה."
  adjective_grandfather:
    name: "סבא"
    title: "שומר המעלית המלכותית"
    location: "ממלכת התארים — המעלית המלכותית"
    description: "סבא טוב לב שמפעיל את המעלית המלכותית כבר שנים רבות."
  adjective_grandmother:
    name: "סבתא"
    title: "שומרת האחו"
    location: "ממלכת התארים — אחו החיות"
    description: "סבתא חמה ואוהבת שמטפלת בחיות שבאחו."
  adjective_crazy_old_man:
    name: "הזקן המשוגע"
    title: "משקיף דרך המסחר"
    location: "ממלכת התארים — דרך המסחר"
    description: "זקן מוזר שמבחין בכל דבר משונה שמתרחש בדרך המסחר."

