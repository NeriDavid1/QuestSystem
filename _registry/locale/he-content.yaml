questlines:
  vocabulary_adventures:
    display_name: "הרפתקאות אוצר המילים"
    theme: "48 מילים חדשות באנגלית דרך חיות, ממלכת האוכל, בית הספר והרפתקאות מצחיקות (רמות 11–30)"
    quests:
      q01_goat_ate_map:
        name: "העז שאכלה את המפה"
        summary: "עז אכלה את מפת החווה, ועכשיו לומדים goat, duck ו־horse כדי להחזיר כל חיה למקום הנכון."
      q02_owl_morning:
        name: "הינשוף שונא את הבוקר"
        summary: "ינשוף ישנוני, שועל עם משקפיים ודוב שלוחש בקול מלמדים fox, owl ו־bear."
      q03_parrot_king:
        name: "התוכי שהפך למלך"
        summary: "תוכי הכריז על עצמו כמלך הג'ונגל; לומדים monkey, tiger ו־parrot לפני שהוא מטיל מס על בננות."
      q04_octopus_socks:
        name: "שמונה גרביים לתמנון"
        summary: "תמנון דורש שמונה גרביים תואמות, ובדרך לומדים dolphin, shark ו־octopus."
      q05_animal_parade:
        name: "מצעד החיות"
        summary: "חוזרים על 12 מילות החיות בהתאמה, שמיעה ודיבור ומארגנים מצעד שבו הכריש מבטיח לא לנשוך את התזמורת."
      q06_pancake_crown:
        name: "כתר הפנקייק"
        summary: "ארוחת הבוקר המלכותית יצאה משליטה; לומדים pancake, cereal ו־honey כדי להציל כתר דביק במיוחד."
      q07_onion_knight:
        name: "אביר הבצל"
        summary: "בצל עטה שריון וגרם לכל הזירה לבכות; לומדים carrot, pepper ו־onion בטורניר הירקות."
      q08_muffin_escape:
        name: "בריחת המאפין הגדולה"
        summary: "מאפין נמלט מהמאפייה עם עוגייה כשותפה; לומדים bread, cookie ו־muffin לפני שעת התה."
      q09_cheese_moon:
        name: "ירח הגבינה"
        summary: "הטבח בטוח שהירח עשוי גבינה; לומדים soup, salad ו־cheese כדי להכין משתה הגיוני יותר."
      q10_food_festival:
        name: "פסטיבל האוכל המלכותי"
        summary: "חוזרים על 12 מילות האוכל ומצילים פסטיבל שבו הפנקייק רוצה כתר והבצל שוב נואם בדמעות."
      q11_pencil_rebellion:
        name: "מרד העיפרון"
        summary: "העפרונות מסרבים לכתוב עד שיקבלו חופשה; לומדים pencil, ruler ו־notebook ומשיבים סדר לכיתה."
      q12_paint_sneeze:
        name: "הציור שהתעטש"
        summary: "ציור מתעטש צבע על הקירות; לומדים brush, paint ו־paper כדי לתקן יצירת אמנות רועשת."
      q13_robot_homework:
        name: "הרובוט אכל את שיעורי הבית"
        summary: "רובוט טוען ששיעורי הבית טעימים; לומדים magnet, planet ו־robot במעבדת המדעים."
      q14_slide_to_moon:
        name: "המגלשה לירח"
        summary: "המנהל חושש שהמגלשה מגיעה לירח; לומדים swing, slide ו־rope ובודקים לאן היא באמת מובילה."
      q15_school_day:
        name: "יום הלימודים המוזר ביותר"
        summary: "חוזרים על 12 מילות בית הספר ביריד שבו העיפרון שובת, הציור מתעטש והרובוט מבקש קינוח."
      q16_helmet_hair:
        name: "הקסדה עם השיער"
        summary: "קסדה מצמיחה תסרוקת מלכותית; לומדים helmet, banner ו־armor לפני שהשריון מבקש שמפו."
      q17_potion_hiccups:
        name: "שיקוי השיהוקים"
        summary: "שיקוי גורם לכל הסדנה לשהק נצנצים; לומדים potion, wand ו־spell כדי לעצור את הבלגן."
      q18_compass_confusion:
        name: "המצפן המבולבל"
        summary: "מצפן מצביע על ארוחת הצהריים במקום על הצפון; לומדים compass, backpack ו־tent ויוצאים למחנה."
      q19_thunder_applause:
        name: "הרעם רוצה מחיאות כפיים"
        summary: "הרעם משוכנע שהוא כוכב במה; לומדים cloud, rainbow ו־thunder ומסיימים את מופע הסערה."
      q20_word_carnival:
        name: "קרנבל המילים הגדול"
        summary: "מבחן מסכם מצחיק: מתאימים, שומעים, מאייתים ואומרים את כל 48 המילים כדי להשלים את אטלס אוצר המילים."

  royal_nouns:
    display_name: "ספר ה־nouns המלכותי"
    theme: "לימוד nouns מתקדמים מעולם הממלכה דרך סיפור מצחיק, הקשבה, התאמה, איות ודיבור (רמות 4–10)"
    quests:
      q01_roles_without_names:
        name: "תפקידים בלי שמות"
        summary: "המילים KING, QUEEN ו־KNIGHT נעלמו, וחדר הכס התמלא בבלבול מלכותי מצחיק."
      q02_castle_on_the_map:
        name: "הטירה שהפכה למגדל"
        summary: "CASTLE, TOWER ו־GATE החליפו מקומות במפה ושולחים את תושבי הממלכה ליעדים הלא נכונים."
      q03_crown_soup:
        name: "מרק הכתר"
        summary: "המלך מבלבל בין CROWN, THRONE ו־TREASURE ומגיע לחצר עם קערת מרק על הראש."
      q04_soup_shield:
        name: "מגן המרק"
        summary: "SWORD, SHIELD ו־SCROLL התערבבו בנשקייה, וגובלין ברח עם דף ה־nouns החסר."
