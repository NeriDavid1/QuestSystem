  adjective_water_man:
    name: "איש המים"
    title: "שומר המעיין"
    location: "ממלכת התארים — המעיין הקפוא"
    description: "האחראי על המעיינות ודרכי המים של הממלכה."
  adjective_grandfather:
    name: "סבא"
    title: "שומר המעלית המלכותית"
    location: "ממלכת התארים — המעלית המלכותית"
    description: "סבא טוב לב שמפעיל את המעלית המלכותית כבר שנים רבות."
  adjective_grandmother:
    name: "סבתא"
    title: "שומרת האחו"
    location: "ממלכת התארים — אחו החיות"
    description: "סבתא חמה ואוהבת שמטפלת בחיות שבאחו."
  adjective_crazy_old_man:
    name: "הזקן המשוגע"
    title: "משקיף דרך המסחר"
    location: "ממלכת התארים — דרך המסחר"
    description: "זקן מוזר שמבחין בכל דבר משונה שמתרחש בדרך המסחר."

  royal_librarian:
    name: "הספרנית המלכותית"
    title: "שומרת ספר ה־nouns המלכותי"
    location: "ספריית ה־nouns המלכותית"
    description: "ספרנית סבלנית שעוזרת לגיבורים צעירים להשיב את שמות האנשים, המקומות, החפצים והיצורים בממלכה."
  forgetful_king:
    name: "המלך השכחן"
    title: "שליט ממלכת ה־nouns"
    location: "חדר הכס המלכותי"
    description: "מלך טוב לב שמבלבל בין חפצי הארמון לאחר שה־nouns שלהם נעלמו."
  royal_armorer:
    name: "נפח הנשק המלכותי"
    title: "שומר הנשקייה המלכותית"
    location: "הנשקייה המלכותית"
    description: "אומן זהיר שמנסה להחזיר את השמות הנכונים לחרבות, מגנים ומגילות."
  confused_wizard:
    name: "הקוסם המבולבל"
    title: "סוחר קסמים זמני"
    location: "שער השוק המלכותי"
    description: "קוסם שפתח בטעות חנות קסמים מוזלת לאחר ששמות אנשי החצר התערבבו."
  offended_dragon:
    name: "הדרקון הנעלב"
    title: "שומר ארכיון היצורים"
    location: "ארכיון היצורים המלכותי"
    description: "דרקון גאה שמתנגד בתוקף לכך שמישהו קרא לו goblin."
  vocabulary_keeper:
    name: "שומר אוצר המילים"
    title: "שומר אטלס המילים הגדול"
    location: "קרנבל אוצר המילים"
    description: "מדריך עליז שאוסף מילים שימושיות באנגלית מתוך האסונות המצחיקים ביותר בממלכה."
  animal_caretaker:
    name: "מטפל החיות"
    title: "שומר החיות המלכותיות"
    location: "מתחם החיות המלכותי"
    description: "מטפל סבלני שהחיות שלו מחליפות בלי הפסקה מקומות, בגדים ותפקידים."
  food_queen:
    name: "מלכת האוכל"
    title: "שליטת ממלכת האוכל"
    location: "ארמון המטבח המלכותי"
    description: "מלכה חגיגית שהופכת כל ארוחה לטורניר ומתייחסת לכל מאפין כמו לאזרח חשוב."
  school_headmaster:
    name: "מנהל בית הספר"
    title: "מנהל בית הספר המלכותי"
    location: "בית הספר המלכותי"
    description: "מנהל טוב לב שמנסה להשתלט על עפרונות מורדים, ציורים מתעטשים ורובוטים שאוכלים שיעורי בית."
  adventure_scout:
    name: "סייר ההרפתקאות"
    title: "מוביל המשלחות המלכותי"
    location: "מחנה ההרפתקאות"
    description: "סייר נמרץ שהמצפן שלו מבולבל, אבל חוש ההומור שלו מכוון בדיוק."

