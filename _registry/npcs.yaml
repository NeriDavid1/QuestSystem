# NPC registry — referenced by quest givers and step targets.

npcs:

  theron:
    name: "Theron"
    title: "Blacksmith"
    location: "Forge District"
    description: "Master smith who teaches crafting through hands-on work."

  lina:
    name: "Lina"
    title: "Merchant"
    location: "Market Square"
    description: "Sharp-eyed trader who tests players with deals and deliveries."

  marcus:
    name: "Captain Marcus"
    title: "Guard Captain"
    location: "City Barracks"
    description: "Veteran soldier assigning patrol and combat duties."

  elara:
    name: "Elara"
    title: "Herbalist"
    location: "Mistwood Outskirts"
    description: "Quiet healer who sends players to gather rare plants."

  vex:
    name: "Vex"
    title: "The Stranger"
    location: "Unknown (appears dynamically)"
    description: "Enigmatic figure with a long-running mystery arc."

  teacher_maya:
    name: "Maya"
    title: "English Teacher"
    location: "English Kingdom — Alphabet Plaza"
    description: "Cheerful teacher who guides children through letters and words with silly stories."

  adjective_knight:
    name: "The Knight"
    title: "Keeper of the Adjective Crown"
    location: "Adjective Kingdom — Crown Camp"
    description: "A nameless knight who asks young heroes to restore the crystals of the Adjective Crown."

  adjective_village_chief:
    name: "The Village Chief"
    title: "Head of the Village"
    location: "Adjective Kingdom — Village Gate"
    description: "The village leader who needs help making the entrance safe again."

  adjective_water_man:
    name: "The Water Man"
    title: "Keeper of the Spring"
    location: "Adjective Kingdom — Frozen Spring"
    description: "The keeper responsible for the kingdom's springs and waterways."

  adjective_grandfather:
    name: "Grandfather"
    title: "Royal Lift Keeper"
    location: "Adjective Kingdom — Royal Lift"
    description: "A kind grandfather who has operated the royal lift for many years."

  adjective_grandmother:
    name: "Grandmother"
    title: "Keeper of the Meadow"
    location: "Adjective Kingdom — Mixed Meadow"
    description: "A warm grandmother who cares for the animals in the mixed meadow."

  adjective_crazy_old_man:
    name: "The Crazy Old Man"
    title: "Road Watcher"
    location: "Adjective Kingdom — Trade Road"
    description: "An eccentric old man who notices every strange event on the trade road."

  royal_librarian:
    name: "The Royal Librarian"
    title: "Keeper of the Royal Book of Nouns"
    location: "Royal Noun Library"
    description: "A patient librarian who helps young heroes restore the missing kingdom nouns."

  forgetful_king:
    name: "The Forgetful King"
    title: "Ruler of the Noun Kingdom"
    location: "Royal Throne Room"
    description: "A good-hearted king who keeps confusing royal objects after their nouns disappear."

  royal_armorer:
    name: "The Royal Armorer"
    title: "Keeper of the Armory"
    location: "Royal Armory"
    description: "A careful armorer trying to return the correct names to swords, shields, and scrolls."

  confused_wizard:
    name: "The Confused Wizard"
    title: "Temporary Magic Merchant"
    location: "Royal Market Gate"
    description: "A wizard who accidentally opens a discount magic shop when the court nouns are mixed up."

  offended_dragon:
    name: "The Offended Dragon"
    title: "Guardian of the Creature Archive"
    location: "Royal Creature Archive"
    description: "A proud dragon who strongly objects to being labeled as a goblin."

  vocabulary_keeper:
    name: "The Vocabulary Keeper"
    title: "Keeper of the Great Word Atlas"
    location: "Vocabulary Carnival"
    description: "A cheerful guide who collects useful English words from the kingdom's funniest disasters."

  animal_caretaker:
    name: "The Animal Caretaker"
    title: "Keeper of the Royal Animals"
    location: "Royal Animal Grounds"
    description: "A patient caretaker whose animals constantly swap places, clothes, and job titles."

  food_queen:
    name: "The Food Queen"
    title: "Ruler of the Food Kingdom"
    location: "Royal Kitchen Palace"
    description: "A festive queen who treats every meal like a tournament and every muffin like a citizen."

  school_headmaster:
    name: "The Headmaster"
    title: "Head of the Royal School"
    location: "Royal School"
    description: "A kind headmaster trying to keep pencils, paintings, and homework-eating robots under control."

  adventure_scout:
    name: "The Adventure Scout"
    title: "Royal Expedition Leader"
    location: "Adventure Camp"
    description: "An energetic scout whose compass is confused but whose sense of humor is perfectly accurate."
