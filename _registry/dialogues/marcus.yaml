# Dialogue scripts for Captain Marcus

dialogues:

  marcus_enlistment_oath:
    speaker: marcus
    lines:
      - "עמדו ישר. אני קפטן מרקוס, ראש המשמר."
      - "אתם רוצים להצטרף? המשמר לא מקבל כולם — צריך להוכיח ערך."
      - "לכו לחצר האימונים והביסו 3 בובות אימון. בלי רחמים."
      - "אם תחזרו שבורים — לפחות תחזרו עם כבוד."

  marcus_enlistment_complete:
    speaker: marcus
    lines:
      - "עבודה טובה. אתם רשמית חלק מהמשמר."
      - "קחו את תג השומר — וזכרו: העיר סומכת עליכם."
      - "מחר מתחיל סיור הלילה הראשון שלכם."

  marcus_q02_night_patrol_start:
    speaker: marcus
    lines:
      - "הלילה אתם סורקים את שכונות העיר."
      - "לכו לנתיב הסיור, סיירו בכל נקודת מעקב, והיזהרו מתנועות חשודות."
      - "בלילה, כל צל יכול להיות אויב — או סתם חתול. בדקו בכל מקרה."

  marcus_q03_bandit_camp_start:
    speaker: marcus
    lines:
      - "דיווח הגיע על מחנה שודדים מחוץ לחומות."
      - "לכו למחנה, הביסו את השודדים, וטהרו את האזור."
      - "אל תחזרו בלי לסיים את העבודה. העיר סומכת עליכם."

  marcus_q04_missing_scout_start:
    speaker: marcus
    lines:
      - "סייר שלנו נעלם במשלחת מזרחה — אחרון שראו אותו ליד יער הערפל."
      - "לכו ליער, חפשו עקבות, ומצאו אותו לפני שיהיה מאוחר מדי."
      - "סייר טוב לא נעלם בלי סיבה. מצאו את הסיבה."

  marcus_q05_wall_breach_start:
    speaker: marcus
    lines:
      - "נמצאה פרצה בחומת העיר — מישהו או משהו ניסה לחדור."
      - "לכו לפרצה, אספו חומרי בנייה, ותקנו את החומה לפני שיגיעו עוד אויבים."
      - "חומה שבורה = עיר פגיעה. תקנו אותה."

  marcus_q06_arena_trial_start:
    speaker: marcus
    lines:
      - "הגיע הזמן למבחן הזירה — כל שומר חייב לעבור אותו."
      - "לכו לזירה, הביסו את יריבי הקרב, והוכיחו שאתם ראויים לשאת מגן."
      - "הקהל יצפה. אל תאכזבו אותם."

  marcus_q07_saboteur_start:
    speaker: marcus
    lines:
      - "מישהו מנסה לחבל במאגרי המים ובמחסני האספקה של העיר."
      - "חקרו את האזורים החשודים, מצאו את המשחית, ועצרו אותו."
      - "בלי מים ואוכל — העיר נופלת מבפנים. מצאו אותו."

  marcus_q08_siege_prep_start:
    speaker: marcus
    lines:
      - "מודיעין מדווח על צבא שמתקרב — מצור יגיע בקרוב."
      - "אספו אספקה, חזקו את החומות, והכינו את העיר לקרב."
      - "כל שומר, כל אזרח — כולם צריכים להיות מוכנים."

  marcus_q09_last_stand_start:
    speaker: marcus
    lines:
      - "הם כאן. הצבא עומד לפני השערים."
      - "הגנו על העיר בקרב ההכרעה — זו העמדה האחרונה."
      - "אם נפול — הכל נגמר. אל תפלו."

  marcus_q10_captains_legacy_start:
    speaker: marcus
    lines:
      - "שרדתם את כל מה שזרקתי עליכם. אתם לא רק שומרים — אתם לוחמים."
      - "המבחן האחרון: קבלו את המלצת הקפטן ואת מורשת המשמר."
      - "העיר בטוחה בזכותכם. תודה — מכל הלב."
