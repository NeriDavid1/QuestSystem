# Dialogue scripts for Lina the Merchant

dialogues:

  lina_first_sale_intro:
    speaker: lina
    lines:
      - "שלום! אני לינה, הסוחרת הכי חדה בכיכר."
      - "רוצים ללמוד מסחר? הכלל הראשון: קנו בזול, מכרו ביוקר."
      - "שחקו במשא ומתן בשוק — נסו לקבל את המחיר הכי טוב."
      - "אל תתביישו להציע פחות. הלקוח תמיד מצפה לזה."

  lina_first_sale_complete:
    speaker: lina
    lines:
      - "עסקה מעולה! יש לכם כישרון טבעי למסחר."
      - "קחו את תיק הסוחר — מעכשיו אתם שותפים שלי."
      - "בפעם הבאה נשלח אתכם למשלוח תבלינים אמיתי."

  lina_q02_spice_run_start:
    speaker: lina
    lines:
      - "השוק צריך תבלינים נדירים — בלי זה אין מרק, אין עוגיות, אין שמחה."
      - "לכו לשוק המזרחי, אספו את התבלינים מהרשימה, והביאו אותם לפני שהמחירים עולים."
      - "זרזו — המתחרים שלי כבר בדרך."

  lina_q03_debt_collection_start:
    speaker: lina
    lines:
      - "יש לקוח שחייב לי כסף כבר שבועיים. הוא 'שכח'."
      - "לכו אליו בכיכר, דברו איתו, ואספו את החוב."
      - "תהיו נחמדים — אבל לא יותר מדי נחמדים."

  lina_q04_market_rivals_start:
    speaker: lina
    lines:
      - "סוחר מתחרה מוכר את אותם מוצרים במחיר נמוך יותר — זה לא הוגן."
      - "לכו לכיכר, שחקו במשא ומתן, והראו לו מי הסוחר האמיתי כאן."
      - "מי שמוכר בזול מדי — מפסיד בסוף."

  lina_q05_rare_import_start:
    speaker: lina
    lines:
      - "יש הזדמנות לייבא סחורה נדירה מהנמל — אבל צריך לזרז."
      - "לכו לנמל, אספו את הסחורה, והביאו אותה לפני שהמכס נסגר."
      - "סחורה נדירה = רווח גדול. אל תפספסו."

  lina_q06_lost_shipment_start:
    speaker: lina
    lines:
      - "משלוח חשוב אבד בדרך — הנהג אומר שראה 'משהו מוזר' ביער."
      - "אתרו את המשלוח, אספו את הסחורה, והביאו אותה לשוק."
      - "בלי המשלוח הזה, אני מפסידה לקוחות חשובים."

  lina_q07_counterfeit_coins_start:
    speaker: lina
    lines:
      - "מטבעות מזויפים מופיעים בשוק — מישהו מנסה להרוס את האמון שלי."
      - "חקרו את הכיכר, מצאו את מקור המזויפים, וחשפו את האחראי."
      - "מסחר בונה על אמון. בלי אמון — אין מסחר."

  lina_q08_trade_route_start:
    speaker: lina
    lines:
      - "הגיע הזמן לפתוח נתיב מסחר חדש לעיר השכנה."
      - "סיירו בנתיב, נקו מכשולים, וסמנו את הדרך לשיירות."
      - "נתיב מסחר חדש = כסף חדש. בואו נפתח אותו."

  lina_q09_merchants_gamble_start:
    speaker: lina
    lines:
      - "יש הזדמנות מסחרית מסוכנת — רווח ענק, אבל גם סיכון גדול."
      - "שחקו במשא ומתן ברמה הגבוהה ביותר. הימור אחד, הכל או כלום."
      - "אני מאמינה בכם. אל תאכזבו אותי."

  lina_q10_empire_trade_start:
    speaker: lina
    lines:
      - "הגענו לסוף המסלול. הגיע הזמן להפוך לשותפה המלאה שלי."
      - "השלימו את העסקה הגדולה ביותר — שיירה לכל הערים, מחירים מושלמים."
      - "אם תצליחו, תקבלו שק זהב ותהיו שותפים באימפריית המסחר שלי."
