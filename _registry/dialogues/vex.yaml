# Dialogue scripts for Vex the Mystery Stranger

dialogues:

  vex_whisper_intro:
    speaker: vex
    lines:
      - "...אתם שומעים? לא? טוב. אני שומע דברים שאחרים לא."
      - "אני וקס. אני מופיע רק כשהלילה חשוך מספיק."
      - "יש מקום בחורבות העתיקות — שער שלא אמור להיות פתוח. לכו לשם."
      - "אל תשאלו למה. פשוט לכו. ואל תספרו לאף אחד."

  vex_whisper_complete:
    speaker: vex
    lines:
      - "ראיתם את השער. טוב. זה אומר שהעיניים שלכם פתוחות."
      - "קחו את הפתק הזה. הוא נראה ריק — אבל רק למי שלא רואה."
      - "המסע רק מתחיל. ואני אהיה כאן — כשתצטרכו."

  vex_q02_hidden_door_start:
    speaker: vex
    lines:
      - "הפתק שהבאתי לכם מכיל רמז — אם יודעים איפה לחפש."
      - "בחורבות העתיקות יש דלת נסתרת. מצאו אותה."
      - "הדלת לא נפתחת לכולם. רק למי שמחפש באמת."

  vex_q03_shadows_follow_start:
    speaker: vex
    lines:
      - "מישהו — או משהו — עוקב אחריכם. הרגשתם?"
      - "הצללים בחורבות לא תמיד שייכים לכם. הימלטו מהם."
      - "אל תסתובבו. פשוט רוצו. אני אחכה בצד השני."

  vex_q04_cryptic_map_start:
    speaker: vex
    lines:
      - "מצאתי מפה — אבל היא כתובה בשפה שכמעט נשכחה."
      - "פענחו את הרמזים, מצאו את הנקודה המסומנת, והביאו לי מה שתמצאו שם."
      - "המפה לא משקרת. אבל היא גם לא אומרת את כל האמת."

  vex_q05_locked_chest_start:
    speaker: vex
    lines:
      - "יש תיבה נעולה במעמקי החורבות. אף אחד לא הצליח לפתוח אותה."
      - "הרמזים מהמפה יובילו אתכם למפתח — או למה שעובד כמפתח."
      - "מה שבתוך התיבה... שינה את חיי. אולי גם את שלכם."

  vex_q06_names_unspoken_start:
    speaker: vex
    lines:
      - "יש שמות שאסור לדבר עליהם בעיר. שמות שנמחקו מההיסטוריה."
      - "מצאו את האמת — מי היו האנשים האלה, ולמה שתקו אותם."
      - "האמת כואבת. אבל שקרים כואבים יותר."

  vex_q07_mirror_trial_start:
    speaker: vex
    lines:
      - "יש מראה קסומה בחורבות. היא לא מראה את מה שאתם רואים — אלא את מה שאתם מפחדים."
      - "עברו את מבחן המראה. אל תברחו ממה שתראו."
      - "מי שעובר את המראה — ראוי לדעת את הסוד הבא."

  vex_q08_sigil_vex_start:
    speaker: vex
    lines:
      - "חותם וקס — סמל עתיק שמחבר בין העולמות."
      - "אספו את החלקים מהמקומות שסימנתי, והשלימו את החותם."
      - "כשהחותם שלם — דלתות ייפתחו שלא ידעתם שקיימות."

  vex_q09_other_side_start:
    speaker: vex
    lines:
      - "החותם פועל. עכשיו אפשר לחצות — לעבר הצד השני של המראה."
      - "מה ששם לא דומה למה שכאן. היזהרו. ואל תיגעו בדברים שזוהרים."
      - "אני אחכה כאן. מי שיחזור — יבין הכל."

  vex_q10_truth_revealed_start:
    speaker: vex
    lines:
      - "הגענו לסוף. אתם ראויים לשמוע את האמת — כל האמת."
      - "אני לא תמיד הייתי 'וקס הזר'. פעם הייתי מישהו אחר. מישהו שהעיר שכחה."
      - "קחו את השריד העתיק. זה שלכם עכשיו. והאמת — גם."
